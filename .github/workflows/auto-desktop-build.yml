name: Auto Desktop Build

on:
  workflow_run:
    workflows: ["Patch Check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ref to build from"
        required: false
        default: "main"
      platform:
        description: "Desktop platform to build"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - macos
          - linux
          - windows

permissions:
  contents: write
  packages: read

concurrency:
  group: desktop-build-${{ github.event_name == 'workflow_dispatch' && inputs.upstream_ref || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

env:
  DESKTOP_PACKAGE_PATH: packages/desktop

jobs:
  prepare:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'patchset')
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.meta.outputs.source_sha }}
      patched_sha: ${{ steps.meta.outputs.patched_sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout patchset
        uses: actions/checkout@v4
        with:
          ref: patchset
          path: patchset

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: getpaseo/paseo
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.upstream_ref || 'main' }}
          path: source
          fetch-depth: 0

      - name: Apply patches
        working-directory: source
        run: |
          set -euo pipefail
          git config user.name "patch-ci"
          git config user.email "ci@localhost"
          git config rerere.enabled true

          shopt -s nullglob
          PATCHES=(../patchset/patches/cur/*.patch)
          APPLIED=0
          for patch in "${PATCHES[@]}"; do
            NAME=$(basename "$patch")
            echo "==== Applying: $NAME ===="
            git am --3way "$patch"
            APPLIED=$((APPLIED + 1))
          done
          echo "Applied ${APPLIED} patch(es)."

      - name: Sanitize generated branch
        working-directory: source
        run: |
          set -euo pipefail
          echo "SOURCE_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          if [[ -d .github/workflows ]]; then
            rm -rf .github/workflows
            git add -A .github/workflows
            if ! git diff --cached --quiet; then
              git commit -m "Drop upstream workflow files from generated patched branch"
            fi
          fi

      - name: Update patched branch
        working-directory: source
        run: |
          set -euo pipefail
          git remote add our-fork "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" || true
          git push our-fork HEAD:refs/heads/patched --force

      - name: Resolve metadata
        id: meta
        working-directory: source
        env:
          SOURCE_SHA: ${{ env.SOURCE_SHA }}
        run: |
          set -euo pipefail
          patched_sha="$(git rev-parse HEAD)"
          source_sha="${SOURCE_SHA}"
          version="$(node -p "require('./package.json').version")"
          echo "patched_sha=${patched_sha}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.patched_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Install Linux desktop build dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build Linux desktop artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_GH_IGNORE_TIME: true
          PASEO_DESKTOP_SMOKE: "1"
        run: npm run build:desktop -- --publish never --linux --x64

      - name: Upload Linux desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.source_sha }}
          path: ${{ env.DESKTOP_PACKAGE_PATH }}/release/*
          if-no-files-found: error
          retention-days: 14

  build-windows:
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.patched_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Build Windows desktop artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_GH_IGNORE_TIME: true
          PASEO_DESKTOP_SMOKE: "1"
        run: npm run build:desktop -- --publish never --win --x64 --arm64

      - name: Upload Windows desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.source_sha }}
          path: ${{ env.DESKTOP_PACKAGE_PATH }}/release/*
          if-no-files-found: error
          retention-days: 14

  build-macos:
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            electron_arch: arm64
          - runner: macos-15-intel
            electron_arch: x64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.patched_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Build macOS desktop artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_GH_IGNORE_TIME: true
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: >
          npm run build:desktop -- --publish never --mac --${{ matrix.electron_arch }}
          -c.mac.identity=null
          -c.mac.notarize=false

      - name: Smoke test packaged macOS app
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "${DESKTOP_PACKAGE_PATH}/release" -type d -name 'Paseo.app' -print | sort | head -n 1)"
          if [[ -z "${app_path}" ]]; then
            echo "::error::No packaged Paseo.app found under ${DESKTOP_PACKAGE_PATH}/release"
            find "${DESKTOP_PACKAGE_PATH}/release" -maxdepth 3 -print || true
            exit 1
          fi
          node "${DESKTOP_PACKAGE_PATH}/scripts/smoke-packaged-desktop-app.js" --app "${app_path}"

      - name: Upload macOS DMG artifact
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.electron_arch }}-dmg-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.source_sha }}
          path: ${{ env.DESKTOP_PACKAGE_PATH }}/release/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS ZIP artifact
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.electron_arch }}-zip-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.source_sha }}
          path: ${{ env.DESKTOP_PACKAGE_PATH }}/release/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS blockmaps
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.electron_arch }}-blockmaps-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.source_sha }}
          path: ${{ env.DESKTOP_PACKAGE_PATH }}/release/*.blockmap
          if-no-files-found: warn
          retention-days: 14

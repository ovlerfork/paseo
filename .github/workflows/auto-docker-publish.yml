name: Auto Docker Publish

on:
  workflow_run:
    workflows: ["Patch Check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ref to build from"
        required: false
        default: "main"
      paseo_version:
        description: "Paseo npm version to bake (defaults to source package.json version)."
        required: false
        default: ""

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-publish-${{ github.event_name == 'workflow_dispatch' && inputs.upstream_ref || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  prepare:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'patchset')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      owner: ${{ steps.meta.outputs.owner }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
    steps:
      - name: Checkout patchset
        uses: actions/checkout@v4
        with:
          ref: patchset
          path: patchset

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: getpaseo/paseo
          ref: ${{ inputs.upstream_ref || 'main' }}
          path: source
          fetch-depth: 0

      - name: Apply patches
        working-directory: source
        run: |
          set -euo pipefail
          git config user.name "patch-ci"
          git config user.email "ci@localhost"
          for patch in ../patchset/patches/cur/*.patch; do
            git am --3way "$patch"
          done

      - name: Update patched branch
        working-directory: source
        run: |
          set -euo pipefail
          git remote add our-fork "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" || true
          git push our-fork HEAD:refs/heads/patched --force

      - name: Resolve metadata
        id: meta
        working-directory: source
        env:
          INPUT_PASEO_VERSION: ${{ inputs.paseo_version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_PASEO_VERSION}" ]]; then
            version="${INPUT_PASEO_VERSION}"
          else
            version="$(node -p "require('./package.json').version")"
          fi
          owner="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${version} owner=${owner} source_sha=$(git rev-parse --short HEAD)"

  base:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian13
            base: debian:13-slim
            moving: debian
            latest: true
          - name: debian12
            base: debian:12-slim
          - name: ubuntu2404
            base: ubuntu:24.04
            moving: ubuntu
          - name: ubuntu-sandbox
            base: ubuntu:24.04
            moving: ubuntu-sandbox
            runtime_user: root
          - name: ubuntu2204
            base: ubuntu:22.04
          - name: alpine
            base: alpine:3.21
            moving: alpine
            platforms: linux/amd64
          - name: arch
            base: archlinux:base
            moving: arch
            platforms: linux/amd64
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: patched

      - name: Compute tags
        id: tags
        env:
          IMAGE_BASE: ghcr.io/${{ needs.prepare.outputs.owner }}/paseo
          RESOLVED_VERSION: ${{ needs.prepare.outputs.version }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_MOVING: ${{ matrix.moving }}
          MATRIX_LATEST: ${{ matrix.latest }}
        run: |
          set -euo pipefail
          V="${RESOLVED_VERSION}"
          tags="${IMAGE_BASE}:${V}-${MATRIX_NAME}"
          if [[ -n "${MATRIX_MOVING}" ]]; then
            tags="${tags}"$'\n'"${IMAGE_BASE}:${MATRIX_MOVING}"
          fi
          if [[ "${MATRIX_LATEST}" == "true" ]]; then
            tags="${tags}"$'\n'"${IMAGE_BASE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - if: matrix.name != 'arch'
        uses: docker/setup-qemu-action@v3
      - if: matrix.name != 'arch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.name != 'arch'
        uses: docker/build-push-action@v6
        with:
          context: docker/base
          file: docker/base/Dockerfile
          platforms: ${{ matrix.platforms || env.PLATFORMS }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            PASEO_VERSION=${{ needs.prepare.outputs.version }}
            PASEO_RUNTIME_USER=${{ matrix.runtime_user || 'paseo' }}
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          provenance: false
          cache-from: type=gha,scope=base-${{ matrix.name }}
          cache-to: type=gha,scope=base-${{ matrix.name }},mode=max

      - name: Build and push Arch image
        if: matrix.name == 'arch'
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
          ARCH_BASE_IMAGE: ${{ matrix.base }}
          RESOLVED_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -t tags <<< "${TAGS}"
          tag_args=()
          for tag in "${tags[@]}"; do
            if [[ -n "${tag}" ]]; then
              tag_args+=("-t" "${tag}")
            fi
          done

          docker build \
            --platform linux/amd64 \
            "${tag_args[@]}" \
            --build-arg "BASE_IMAGE=${ARCH_BASE_IMAGE}" \
            --build-arg "PASEO_VERSION=${RESOLVED_VERSION}" \
            --build-arg "PASEO_RUNTIME_USER=paseo" \
            docker/base

          for tag in "${tags[@]}"; do
            if [[ -n "${tag}" ]]; then
              docker push "${tag}"
            fi
          done

  mods:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        agent: [claude-code, codex, copilot, opencode, pi]
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: patched

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker/mods/${{ matrix.agent }}
          file: docker/mods/${{ matrix.agent }}/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ghcr.io/${{ needs.prepare.outputs.owner }}/mods:${{ matrix.agent }}
            ghcr.io/${{ needs.prepare.outputs.owner }}/mods:${{ matrix.agent }}-${{ needs.prepare.outputs.version }}
          push: true
          provenance: false

name: Auto Docker Publish

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_run:
    workflows: ["Patch Check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ref to build from"
        required: false
        default: "main"
      paseo_version:
        description: "Paseo version to build. Must match the patched source package.json version."
        required: false
        default: ""

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-publish-${{ github.event_name == 'workflow_dispatch' && inputs.upstream_ref || github.event_name == 'schedule' && 'scheduled-mods' || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  prepare:
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'patchset')
    runs-on: ubuntu-latest
    concurrency:
      group: patched-prepare-${{ github.event_name == 'workflow_dispatch' && inputs.upstream_ref || github.event_name == 'schedule' && 'scheduled-mods' || github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    outputs:
      version: ${{ steps.meta.outputs.version }}
      owner: ${{ steps.meta.outputs.owner }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      patched_sha: ${{ steps.meta.outputs.patched_sha }}
      publish_source_images: ${{ steps.source_image_status.outputs.publish_source_images || 'true' }}
    steps:
      - name: Checkout patchset
        uses: actions/checkout@v4
        with:
          ref: patchset
          path: patchset

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: getpaseo/paseo
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.upstream_ref || 'main' }}
          path: source
          fetch-depth: 0

      - name: Apply patches
        working-directory: source
        run: |
          set -euo pipefail
          git config user.name "patch-ci"
          git config user.email "ci@localhost"
          git config rerere.enabled true

          shopt -s nullglob
          PATCHES=(../patchset/patches/cur/*.patch)
          APPLIED=0
          for patch in "${PATCHES[@]}"; do
            NAME=$(basename "$patch")
            echo "==== Applying: $NAME ===="
            git am --3way "$patch"
            APPLIED=$((APPLIED + 1))
          done
          echo "Applied ${APPLIED} patch(es)."

      - name: Sanitize generated branch
        working-directory: source
        run: |
          set -euo pipefail
          echo "SOURCE_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          if [[ -d .github/workflows ]]; then
            rm -rf .github/workflows
            git add -A .github/workflows
            if ! git diff --cached --quiet; then
              git commit -m "Drop upstream workflow files from generated patched branch"
            fi
          fi

      - name: Update patched branch
        working-directory: source
        run: |
          set -euo pipefail
          git remote add our-fork "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" || true
          git push our-fork HEAD:refs/heads/patched --force

      - name: Resolve metadata
        id: meta
        working-directory: source
        env:
          INPUT_PASEO_VERSION: ${{ inputs.paseo_version }}
          REPO_OWNER: ${{ github.repository_owner }}
          SOURCE_SHA: ${{ env.SOURCE_SHA }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_PASEO_VERSION}" ]]; then
            version="${INPUT_PASEO_VERSION}"
          else
            version="$(node -p "require('./package.json').version")"
          fi
          owner="$(printf '%s' "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          patched_sha="$(git rev-parse HEAD)"
          source_sha="${SOURCE_SHA}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "patched_sha=${patched_sha}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${version} owner=${owner} source_sha=${source_sha} patched_sha=${patched_sha}"

      - name: Check scheduled source image status
        id: source_image_status
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          RESOLVED_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          owner_type="$(gh api "users/${REPO_OWNER}" --jq '.type')"
          if [[ "${owner_type}" == "Organization" ]]; then
            package_path="orgs/${REPO_OWNER}/packages/container/paseo/versions?per_page=100"
          else
            package_path="users/${REPO_OWNER}/packages/container/paseo/versions?per_page=100"
          fi

          existing_tags="$(
            gh api "${package_path}" --paginate --jq '.[] | .metadata.container.tags[]?' 2>/dev/null || true
          )"

          default_tag_exists=false
          ubuntu_tag_exists=false
          if grep -Fxq "${RESOLVED_VERSION}" <<<"${existing_tags}"; then
            default_tag_exists=true
          fi
          if grep -Fxq "${RESOLVED_VERSION}-ubuntu-sandbox" <<<"${existing_tags}"; then
            ubuntu_tag_exists=true
          fi

          publish_source_images=true
          if [[ "${default_tag_exists}" == "true" && "${ubuntu_tag_exists}" == "true" ]]; then
            publish_source_images=false
          fi

          echo "publish_source_images=${publish_source_images}" >> "$GITHUB_OUTPUT"
          echo "default_tag_exists=${default_tag_exists}" >> "$GITHUB_OUTPUT"
          echo "ubuntu_tag_exists=${ubuntu_tag_exists}" >> "$GITHUB_OUTPUT"
          echo "Scheduled source image publish needed: ${publish_source_images}"

  publish-source-image:
    if: needs.prepare.outputs.publish_source_images == 'true'
    needs: prepare
    runs-on: ubuntu-latest
    name: Publish ${{ matrix.image.name }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: default
            cache_scope: paseo-source
            moving_tag: latest
            runtime_image: node:24.16.0-bookworm-slim
            runtime_user: paseo
            variant: ""
          - name: ubuntu-sandbox
            cache_scope: paseo-source-ubuntu-sandbox
            moving_tag: ubuntu-sandbox
            runtime_image: ubuntu:24.04
            runtime_user: root
            variant: ubuntu-sandbox
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.patched_sha }}
          fetch-depth: 0

      - name: Compute tags
        id: tags
        env:
          IMAGE_BASE: ghcr.io/${{ needs.prepare.outputs.owner }}/paseo
          MOVING_TAG: ${{ matrix.image.moving_tag }}
          RESOLVED_VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          VARIANT: ${{ matrix.image.variant }}
        run: |
          set -euo pipefail
          if [[ -n "${VARIANT}" ]]; then
            tags="${IMAGE_BASE}:${RESOLVED_VERSION}-${VARIANT}"
            tags="${tags}"$'\n'"${IMAGE_BASE}:${RESOLVED_VERSION}-${SOURCE_SHA}-${VARIANT}"
            tags="${tags}"$'\n'"${IMAGE_BASE}:${MOVING_TAG}"
          else
            tags="${IMAGE_BASE}:${RESOLVED_VERSION}"
            tags="${tags}"$'\n'"${IMAGE_BASE}:${RESOLVED_VERSION}-${SOURCE_SHA}"
            tags="${tags}"$'\n'"${IMAGE_BASE}:${MOVING_TAG}"
          fi
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push source image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            PASEO_VERSION=${{ needs.prepare.outputs.version }}
            PASEO_RUNTIME_USER=${{ matrix.image.runtime_user }}
            RUNTIME_IMAGE=${{ matrix.image.runtime_image }}
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.image.cache_scope }},mode=max

  publish-mod-images:
    needs: prepare
    runs-on: ubuntu-latest
    name: Publish mod ${{ matrix.agent }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: claude-code
            npm_package: "@anthropic-ai/claude-code"
          - agent: codex
            npm_package: "@openai/codex"
          - agent: copilot
            npm_package: "@github/copilot"
          - agent: opencode
            npm_package: "opencode-ai"
          - agent: pi
            npm_package: "@earendil-works/pi-coding-agent"
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.patched_sha }}
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve mod package version
        id: mod
        env:
          AGENT: ${{ matrix.agent }}
          EVENT_NAME: ${{ github.event_name }}
          IMAGE_BASE: ghcr.io/${{ needs.prepare.outputs.owner }}/mods
          NPM_PACKAGE: ${{ matrix.npm_package }}
          RESOLVED_VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: |
          set -euo pipefail
          package_version="$(npm view "${NPM_PACKAGE}" version --silent)"
          if [[ -z "${package_version}" ]]; then
            echo "Failed to resolve ${NPM_PACKAGE} version." >&2
            exit 1
          fi

          package_version_tag="$(printf '%s' "${package_version}" | sed -E 's/[^A-Za-z0-9_.-]+/-/g')"
          package_ref="${IMAGE_BASE}:${AGENT}-pkg-${package_version_tag}"

          should_build=true
          if [[ "${EVENT_NAME}" == "schedule" ]] && docker buildx imagetools inspect "${package_ref}" >/dev/null 2>&1; then
            should_build=false
          fi

          tags="${IMAGE_BASE}:${AGENT}"
          tags="${tags}"$'\n'"${package_ref}"
          if [[ "${EVENT_NAME}" != "schedule" ]]; then
            tags="${tags}"$'\n'"${IMAGE_BASE}:${AGENT}-${RESOLVED_VERSION}"
            tags="${tags}"$'\n'"${IMAGE_BASE}:${AGENT}-${SOURCE_SHA}"
          fi

          echo "package=${NPM_PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "package_version_tag=${package_version_tag}" >> "$GITHUB_OUTPUT"
          echo "package_ref=${package_ref}" >> "$GITHUB_OUTPUT"
          echo "should_build=${should_build}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "${should_build}" == "true" ]]; then
            echo "Will publish ${AGENT} for ${NPM_PACKAGE}@${package_version}."
          else
            echo "Skipping ${AGENT}; ${package_ref} already exists."
          fi

      - name: Build and push mod image
        if: steps.mod.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: docker/mods/${{ matrix.agent }}
          file: docker/mods/${{ matrix.agent }}/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            PASEO_MOD_NAME=${{ matrix.agent }}
            PASEO_MOD_PACKAGE=${{ matrix.npm_package }}
            PASEO_MOD_PACKAGE_VERSION=${{ steps.mod.outputs.package_version }}
          labels: |
            org.opencontainers.image.version=${{ steps.mod.outputs.package_version }}
            org.ovlerfork.paseo.mod.name=${{ matrix.agent }}
            org.ovlerfork.paseo.mod.package=${{ matrix.npm_package }}
            org.ovlerfork.paseo.mod.package.version=${{ steps.mod.outputs.package_version }}
          tags: ${{ steps.mod.outputs.tags }}
          push: true
          provenance: false

      - name: Skip unchanged mod image
        if: steps.mod.outputs.should_build != 'true'
        run: echo "No publish needed for ${{ matrix.agent }}; package version ${{ steps.mod.outputs.package_version }} is already present."
